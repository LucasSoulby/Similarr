<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Similarr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              arrbg: "#1c252b", // The classic Arr deep blue/grey
              arrcard: "#253139",
              similarr: "#8b5cf6", // Purple accent color for Similarr!
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-arrbg text-gray-200 font-sans antialiased flex h-screen overflow-hidden"
  >
    <div class="w-64 bg-arrcard flex flex-col shadow-lg">
      <div class="h-16 flex items-center px-6 border-b border-gray-700">
        <i class="fa-solid fa-music text-similarr text-2xl mr-3"></i>
        <span class="text-xl font-bold tracking-wider text-white"
          >Similarr</span
        >
      </div>
      <nav class="flex-1 px-4 py-6 space-y-2">
        <a
          href="/"
          class="flex items-center px-4 py-3 rounded-md hover:bg-gray-700 hover:text-white transition"
        >
          <i class="fa-solid fa-chart-line w-6"></i> Dashboard
        </a>
        <a
          href="/settings"
          class="flex items-center px-4 py-3 rounded-md hover:bg-gray-700 hover:text-white transition"
        >
          <i class="fa-solid fa-gear w-6"></i> Settings
        </a>
        <a
          href="/trigger"
          class="flex items-center px-4 py-3 rounded-md hover:bg-gray-700 hover:text-white transition mt-8 text-similarr border border-similarr hover:bg-similarr"
        >
          <i class="fa-solid fa-play w-6"></i> Run Discovery Now
        </a>
      </nav>
    </div>

    <div class="flex-1 flex flex-col h-screen overflow-y-auto">
      <header
        class="h-16 bg-arrcard shadow-sm flex items-center px-8 border-b border-gray-700"
      >
        <h2 class="text-lg font-semibold text-gray-300">
          {% block header %}{% endblock %}
        </h2>
      </header>

      <main class="p-8">{% block content %} {% endblock %}</main>
    </div>
  </body>
</html>
